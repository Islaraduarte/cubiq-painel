<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#ffffff;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
}

.container{
  width:100%;
  max-width:380px;
  padding:20px;
  text-align:center;
}

.logo{
  width:150px;
  margin-bottom:20px;
}

h3{
  margin-bottom:20px;
  color:#555;
  font-weight:500;
}

/* BOTÕES */
.btn{
  display:block;
  width:100%;
  padding:16px;
  margin:10px 0;
  border-radius:12px;
  font-weight:bold;
  text-decoration:none;
  text-align:center;
  transition:0.2s;
}

/* CORES */
.shopee{
  background:#ee4d2d;
  color:#fff;
}

.ml{
  background:#ffe600;
  color:#000;
}

.ideias{
  background:#7e3ff2;
  color:#fff;
}

.catalogo{
  background:#2d6cdf;
  color:#fff;
}

.tutorial{
  background:#ff0000;
  color:#fff;
}

.aprovados{
  background:#2ecc71;
  color:#fff;
}

.v8{
  background:#00B2AD;
  color:#fff;
}

/* CLICK */
.btn:active{
  transform:scale(0.97);
}

/* FOOTER */
.footer{
  margin-top:20px;
  font-size:12px;
  color:#999;
}

/* MOBILE AJUSTE */
@media (max-width:480px){
  .logo{
    width:130px;
  }

  .btn{
    padding:15px;
    font-size:15px;
  }
}
</style>
</head>

<body>

<div class="container">

<img src="https://i.imgur.com/toCmN5E.jpeg" class="logo">

<h3>Painel Interno CubiQ</h3>

<a class="btn shopee" 
href="https://sites.google.com/view/cubiq-3d/shopee"
target="_blank">
🟠 Calculadora Shopee
</a>

<a class="btn ml" 
href="https://sites.google.com/view/cubiq-3d/mercadolivre"
target="_blank">
🟡 Calculadora Mercado Livre
</a>

<a class="btn ideias" 
href="https://forms.gle/3SmJjbAMiKi7NUJM9"
target="_blank">
🟣 Ideias de Produtos
</a>

<a class="btn tutorial" 
href="https://youtu.be/-U-F2v6NaeA"
target="_blank">
🔴 Tutorial
</a>

<a class="btn catalogo" 
href="https://drive.google.com/drive/folders/19UR00SQmhs3wTlcgKSK6j8Qc_47n_LGG?usp=drive_link"
target="_blank">
🔵 Catálogo CubiQ
</a>

<a class="btn aprovados" 
href="https://docs.google.com/spreadsheets/d/1_36mA53W5MwhrdBdGJwQ3rsUCB7qFu1llkdpcT6b-0Y/edit?usp=drive_link"
target="_blank">
🟢 Produtos Aprovados
</a>

<a class="btn v8" 
href="https://islaraduarte.github.io/cubiq-3d/"
target="_blank">
📊 Catálogo v8 – Análise de Produtos
</a>

<div class="footer">
CubiQ © Sistema interno
</div>

</div>

</body>
</html>
